services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: flowpay
      POSTGRES_PASSWORD: flowpay
      POSTGRES_DB: flowpay
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flowpay -d flowpay"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      NODE_ENV: production
      PORT: 3333
      HOST: 0.0.0.0
      LOG_LEVEL: info
      DATABASE_URL: postgresql://flowpay:flowpay@postgres:5432/flowpay?schema=public
      REDIS_URL: redis://redis:6379
      CORS_ORIGIN: http://localhost:5173
      RATE_LIMIT_MAX: 120
      RATE_LIMIT_WINDOW: 1 minute
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "3333:3333"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_URL: http://localhost:3333/api/v1
        VITE_SOCKET_URL: http://localhost:3333
    depends_on:
      - api
    ports:
      - "5173:5173"

volumes:
  postgres-data:
